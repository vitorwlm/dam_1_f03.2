<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="manifest" href="manifest.json">
    <title>Account Maker</title>
</head>
<body>
    <form id="accountForm">
        <div class="mb-3">
            <label for="name" class="form-label">Nome</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="Joe Doe">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="email@email.com">
        </div>
        <div class="mb-3">
            <label for="phone" class="form-label">Telefone</label>
            <input type="tel" class="form-control" id="phone" name="phone" placeholder="+351 912 345 678">
        </div>
        <div class="mb-3">
            <label for="address" class="form-label">Morada</label>
            <input type="text" class="form-control" id="address" name="address" placeholder="Rua Exemplo, 12">
        </div>
        <div class="mb-3">
            <label for="nif" class="form-label">NIF</label>
            <input type="number" class="form-control" id="nif" name="nif" placeholder="123456789">
        </div>
        <div class="mb-3">
            <label for="observations" class="form-label">Observações</label>
            <textarea class="form-control" id="observations" name="observations" rows="3" placeholder="Notas..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Enviar</button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/form.js"></script>
</body>
</html>
